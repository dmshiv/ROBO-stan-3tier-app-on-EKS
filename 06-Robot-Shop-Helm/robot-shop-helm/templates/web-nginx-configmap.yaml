apiVersion: v1
kind: ConfigMap
metadata:
  name: web-nginx-config
  labels:
    service: web
data:
  default.conf: |
    # Instana tracing
    opentracing_load_tracer /usr/local/lib/libinstana_sensor.so /etc/instana-config.json;
    opentracing_propagate_context;

    server {
        listen       8080;
        server_name  localhost;

        proxy_http_version 1.1;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            ssi    on;
            # SPA routing - serve index.html for all unknown routes
            try_files $uri $uri/ /index.html;
        }

        location /images/ {
            expires 5s;
            root   /usr/share/nginx/html;
            try_files $uri /images/placeholder.png;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }

        location /api/catalogue/ {
            proxy_pass http://catalogue:8080/;
        }

        location /api/user/ {
            proxy_pass http://user:8080/;
        }

        location /api/cart/ {
            proxy_pass http://cart:8080/;
        }

        location /api/shipping/ {
            proxy_pass http://shipping:8080/;
        }

        location /api/payment/ {
            proxy_pass http://payment:8080/;
        }

        location /api/ratings/ {
            proxy_pass http://ratings:80/;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
        }
    }
